<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge the AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #222;
    --x-color: #ff3b3b;
    --o-color: #00e5ff;
    --text: #f0f0f0;
    --dim: #555;
    --easy-color: #22c55e;
    --medium-color: #f59e0b;
    --hard-color: #ef4444;
    --perfect-color: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--x-color), var(--o-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
    text-align: center;
  }

  .difficulty-picker {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .diff-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding: 7px 18px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--dim);
    transition: all 0.15s;
  }

  .diff-btn[data-diff="easy"]:hover,
  .diff-btn[data-diff="easy"].active {
    color: var(--easy-color); border-color: var(--easy-color);
    box-shadow: 0 0 14px rgba(34,197,94,0.25);
  }
  .diff-btn[data-diff="medium"]:hover,
  .diff-btn[data-diff="medium"].active {
    color: var(--medium-color); border-color: var(--medium-color);
    box-shadow: 0 0 14px rgba(245,158,11,0.25);
  }
  .diff-btn[data-diff="hard"]:hover,
  .diff-btn[data-diff="hard"].active {
    color: var(--hard-color); border-color: var(--hard-color);
    box-shadow: 0 0 14px rgba(239,68,68,0.25);
  }
  .diff-btn[data-diff="perfect"]:hover,
  .diff-btn[data-diff="perfect"].active {
    color: var(--perfect-color); border-color: var(--perfect-color);
    box-shadow: 0 0 14px rgba(168,85,247,0.25);
  }

  .depth-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--dim);
  }

  .depth-pips { display: flex; gap: 4px; }

  .pip {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .pip.active-easy    { background: var(--easy-color);    border-color: var(--easy-color); }
  .pip.active-medium  { background: var(--medium-color);  border-color: var(--medium-color); }
  .pip.active-hard    { background: var(--hard-color);    border-color: var(--hard-color); }
  .pip.active-perfect { background: var(--perfect-color); border-color: var(--perfect-color); }

  .side-picker {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .side-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    padding: 10px 32px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--dim);
    transition: all 0.15s;
  }
  .side-btn.x-btn:hover, .side-btn.x-btn.active {
    color: var(--x-color); border-color: var(--x-color);
    box-shadow: 0 0 20px rgba(255,59,59,0.3), inset 0 0 20px rgba(255,59,59,0.05);
  }
  .side-btn.o-btn:hover, .side-btn.o-btn.active {
    color: var(--o-color); border-color: var(--o-color);
    box-shadow: 0 0 20px rgba(0,229,255,0.3), inset 0 0 20px rgba(0,229,255,0.05);
  }

  .status {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
    min-height: 1.2em;
    color: var(--text);
    transition: color 0.3s;
    text-align: center;
  }
  .status.thinking { color: var(--o-color); animation: pulse 1s infinite; }
  .status.win-x    { color: var(--x-color); }
  .status.win-o    { color: var(--o-color); }
  .status.draw     { color: var(--dim); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    background: var(--border);
    border: 3px solid var(--border);
  }

  .cell {
    width: clamp(80px, 22vw, 120px);
    height: clamp(80px, 22vw, 120px);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 7vw, 4rem);
    transition: background 0.1s;
    position: relative;
    user-select: none;
  }
  .cell:hover:not(.filled):not(.disabled) { background: #1a1a1a; }
  .cell.filled   { cursor: default; }
  .cell.disabled { cursor: not-allowed; }

  .cell .mark {
    opacity: 0;
    transform: scale(0.3) rotate(-15deg);
    transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .cell .mark.show { opacity: 1; transform: scale(1) rotate(0deg); }
  .cell .mark.x { color: var(--x-color); }
  .cell .mark.o { color: var(--o-color); }

  .cell.winning { background: #1a1a1a; }
  .cell.winning .mark { text-shadow: 0 0 30px currentColor; }

  .cell:hover:not(.filled):not(.disabled)::after {
    content: attr(data-preview);
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 7vw, 4rem);
    opacity: 0.15;
  }
  .cell[data-side="X"]:hover:not(.filled):not(.disabled)::after { color: var(--x-color); }
  .cell[data-side="O"]:hover:not(.filled):not(.disabled)::after { color: var(--o-color); }

  .score-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .score-item { text-align: center; }
  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    display: block;
    margin-top: 2px;
  }
  .score-val.x { color: var(--x-color); }
  .score-val.o { color: var(--o-color); }
  .score-val.d { color: var(--dim); }

  .reset-btn {
    margin-top: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 28px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--text); color: var(--text); }

  .nodes-info {
    margin-top: 12px;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-align: center;
    min-height: 1em;
  }
  .nodes-info span { color: var(--text); }
</style>
</head>
<body>

<h1>Minimax</h1>
<p class="subtitle">Tic-Tac-Toe &mdash; Can you beat the AI?</p>

<div class="section-label">Difficulty</div>
<div class="difficulty-picker">
  <button class="diff-btn" data-diff="easy"    onclick="setDifficulty('easy')">Easy</button>
  <button class="diff-btn active" data-diff="medium"  onclick="setDifficulty('medium')">Medium</button>
  <button class="diff-btn" data-diff="hard"    onclick="setDifficulty('hard')">Hard</button>
  <button class="diff-btn" data-diff="perfect" onclick="setDifficulty('perfect')">Perfect</button>
</div>

<div class="depth-bar-wrap">
  <span>Search depth</span>
  <div class="depth-pips" id="pips"></div>
  <span id="depth-label">3 / 9</span>
</div>

<div class="section-label">Your side</div>
<div class="side-picker">
  <button class="side-btn x-btn active" onclick="chooseSide('X')">X &mdash; First</button>
  <button class="side-btn o-btn"        onclick="chooseSide('O')">O &mdash; Second</button>
</div>

<div class="status" id="status">Your turn</div>
<div class="board"  id="board"></div>

<div class="score-row">
  <div class="score-item">
    <span>You</span>
    <span class="score-val x" id="score-human">0</span>
  </div>
  <div class="score-item">
    <span>Draw</span>
    <span class="score-val d" id="score-draw">0</span>
  </div>
  <div class="score-item">
    <span>AI</span>
    <span class="score-val o" id="score-ai">0</span>
  </div>
</div>

<button class="reset-btn" onclick="resetGame()">[ New Game ]</button>
<div class="nodes-info" id="nodes-info"></div>

<script>
const X = 'X', O = 'O', EMPTY = null;

const DIFFICULTY = {
  easy:    { depth: 1, label: 'Easy' },
  medium:  { depth: 3, label: 'Medium' },
  hard:    { depth: 5, label: 'Hard' },
  perfect: { depth: 9, label: 'Perfect' },
};

let currentDiff = 'medium';
let nodesExplored = 0;

function heuristic(board) {
  let score = 0;
  const lines = [
    [board[0][0],board[0][1],board[0][2]],
    [board[1][0],board[1][1],board[1][2]],
    [board[2][0],board[2][1],board[2][2]],
    [board[0][0],board[1][0],board[2][0]],
    [board[0][1],board[1][1],board[2][1]],
    [board[0][2],board[1][2],board[2][2]],
    [board[0][0],board[1][1],board[2][2]],
    [board[0][2],board[1][1],board[2][0]],
  ];
  for (const line of lines) {
    const xc = line.filter(c => c === X).length;
    const oc = line.filter(c => c === O).length;
    if (xc > 0 && oc > 0) continue;
    if (xc === 2) score += 0.3;
    if (xc === 1) score += 0.1;
    if (oc === 2) score -= 0.3;
    if (oc === 1) score -= 0.1;
  }
  if (board[1][1] === X) score += 0.2;
  if (board[1][1] === O) score -= 0.2;
  return Math.max(-1, Math.min(1, score));
}

function initialState() {
  return [[EMPTY,EMPTY,EMPTY],[EMPTY,EMPTY,EMPTY],[EMPTY,EMPTY,EMPTY]];
}

function playerTurn(board) {
  let xc = 0, oc = 0;
  for (const row of board) for (const c of row) { if (c===X) xc++; if (c===O) oc++; }
  return xc === oc ? X : O;
}

function actions(board) {
  const moves = [];
  for (let i=0;i<3;i++) for (let j=0;j<3;j++) if (board[i][j]===EMPTY) moves.push([i,j]);
  return moves;
}

function result(board, action) {
  const [i,j] = action;
  const nb = board.map(r => [...r]);
  nb[i][j] = playerTurn(board);
  return nb;
}

function winner(board) {
  const lines = [
    [board[0][0],board[0][1],board[0][2]],
    [board[1][0],board[1][1],board[1][2]],
    [board[2][0],board[2][1],board[2][2]],
    [board[0][0],board[1][0],board[2][0]],
    [board[0][1],board[1][1],board[2][1]],
    [board[0][2],board[1][2],board[2][2]],
    [board[0][0],board[1][1],board[2][2]],
    [board[0][2],board[1][1],board[2][0]],
  ];
  for (const l of lines) if (l[0]!==EMPTY && l[0]===l[1] && l[1]===l[2]) return l[0];
  return null;
}

function terminal(board) {
  return winner(board) !== null || actions(board).length === 0;
}

function utility(board) {
  const w = winner(board);
  return w===X ? 1 : w===O ? -1 : 0;
}

function minimax(board) {
  if (terminal(board)) return null;
  const cur = playerTurn(board);
  const maxDepth = DIFFICULTY[currentDiff].depth;
  nodesExplored = 0;

  function maxVal(board, alpha, beta, depth) {
    nodesExplored++;
    if (terminal(board)) return utility(board);
    if (depth === 0) return heuristic(board);
    let v = -Infinity;
    for (const a of actions(board)) {
      v = Math.max(v, minVal(result(board, a), alpha, beta, depth - 1));
      alpha = Math.max(alpha, v);
      if (alpha >= beta) break;
    }
    return v;
  }

  function minVal(board, alpha, beta, depth) {
    nodesExplored++;
    if (terminal(board)) return utility(board);
    if (depth === 0) return heuristic(board);
    let v = Infinity;
    for (const a of actions(board)) {
      v = Math.min(v, maxVal(result(board, a), alpha, beta, depth - 1));
      beta = Math.min(beta, v);
      if (beta <= alpha) break;
    }
    return v;
  }

  let bestAction = null;
  if (cur === X) {
    let best = -Infinity;
    for (const a of actions(board)) {
      const val = minVal(result(board, a), -Infinity, Infinity, maxDepth);
      if (val > best) { best = val; bestAction = a; }
    }
  } else {
    let best = Infinity;
    for (const a of actions(board)) {
      const val = maxVal(result(board, a), -Infinity, Infinity, maxDepth);
      if (val < best) { best = val; bestAction = a; }
    }
  }
  return bestAction;
}

function winningCells(board) {
  const patterns = [
    [[0,0],[0,1],[0,2]],[[1,0],[1,1],[1,2]],[[2,0],[2,1],[2,2]],
    [[0,0],[1,0],[2,0]],[[0,1],[1,1],[2,1]],[[0,2],[1,2],[2,2]],
    [[0,0],[1,1],[2,2]],[[0,2],[1,1],[2,0]],
  ];
  for (const pat of patterns) {
    const vals = pat.map(([i,j]) => board[i][j]);
    if (vals[0]!==EMPTY && vals[0]===vals[1] && vals[1]===vals[2]) return pat;
  }
  return [];
}

let board = initialState();
let humanSide = X;
let aiSide = O;
let gameOver = false;
let scores = { human: 0, ai: 0, draw: 0 };

function setDifficulty(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-diff="${diff}"]`).classList.add('active');
  updateDepthPips();
  resetGame();
}

function updateDepthPips() {
  const depth = DIFFICULTY[currentDiff].depth;
  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';
  for (let i = 1; i <= 9; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i <= depth ? ` active-${currentDiff}` : '');
    pipsEl.appendChild(pip);
  }
  document.getElementById('depth-label').textContent = `${depth} / 9`;
}

function chooseSide(side) {
  humanSide = side;
  aiSide = side === X ? O : X;
  document.querySelector('.x-btn').classList.toggle('active', side === X);
  document.querySelector('.o-btn').classList.toggle('active', side === O);
  resetGame();
}

function resetGame() {
  board = initialState();
  gameOver = false;
  document.getElementById('nodes-info').innerHTML = '';
  renderBoard();
  setStatus('your-turn');
  if (playerTurn(board) === aiSide) {
    setStatus('thinking');
    setTimeout(doAiMove, 400);
  }
}

function setStatus(type) {
  const el = document.getElementById('status');
  el.className = 'status';
  const d = DIFFICULTY[currentDiff];
  const msgs = {
    'your-turn': `Your turn — you are ${humanSide}`,
    'thinking':  `AI thinking [${d.label} — depth ${d.depth}]...`,
    'win-human': `You win! The AI slipped up on ${d.label} mode`,
    'win-ai':    `AI wins — try a lower difficulty`,
    'draw':      `Draw — well played!`,
  };
  el.textContent = msgs[type] || '';
  if (type === 'thinking') el.classList.add('thinking');
  if (type === 'win-human') el.classList.add('win-x');
  if (type === 'win-ai')   el.classList.add('win-o');
  if (type === 'draw')     el.classList.add('draw');
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const wCells = winningCells(board).map(([i,j]) => i*3+j);

  for (let i=0;i<3;i++) {
    for (let j=0;j<3;j++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const idx = i*3+j;
      const val = board[i][j];

      if (val) {
        cell.classList.add('filled');
        if (wCells.includes(idx)) cell.classList.add('winning');
        const mark = document.createElement('span');
        mark.className = `mark ${val.toLowerCase()}`;
        mark.textContent = val;
        cell.appendChild(mark);
        setTimeout(() => mark.classList.add('show'), 10);
      } else {
        if (gameOver || playerTurn(board) === aiSide) {
          cell.classList.add('disabled');
        } else {
          cell.dataset.preview = humanSide;
          cell.dataset.side = humanSide;
          cell.onclick = () => humanMove(i, j);
        }
      }
      boardEl.appendChild(cell);
    }
  }
}

function humanMove(i, j) {
  if (gameOver || board[i][j] !== EMPTY || playerTurn(board) !== humanSide) return;
  board = result(board, [i, j]);
  renderBoard();
  checkEnd();
  if (!gameOver) {
    setStatus('thinking');
    setTimeout(doAiMove, 350);
  }
}

function doAiMove() {
  const move = minimax(board);
  if (move) {
    board = result(board, move);
    renderBoard();
    const d = DIFFICULTY[currentDiff];
    document.getElementById('nodes-info').innerHTML =
      `Last move: <span>${nodesExplored.toLocaleString()}</span> nodes explored &mdash; depth <span>${d.depth}</span>`;
  }
  checkEnd();
  if (!gameOver) setStatus('your-turn');
}

function checkEnd() {
  const w = winner(board);
  if (w) {
    gameOver = true;
    renderBoard();
    if (w === humanSide) { scores.human++; setStatus('win-human'); }
    else                 { scores.ai++;    setStatus('win-ai');    }
  } else if (terminal(board)) {
    gameOver = true;
    scores.draw++;
    setStatus('draw');
  }
  document.getElementById('score-human').textContent = scores.human;
  document.getElementById('score-ai').textContent    = scores.ai;
  document.getElementById('score-draw').textContent  = scores.draw;
}

updateDepthPips();
renderBoard();
setStatus('your-turn');
</script>
</body>
</html>
